<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jeab Game Store</title>

<link rel="icon" type="image/png" href="Logo.png">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: radial-gradient(circle at top, #3b2a00, #000000);
color:white;
overflow-x:hidden;
}

body::before{
content:"";
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#ffd900 1px, transparent 1px);
background-size:60px 60px,120px 120px;
opacity:0.15;
animation:stars 60s linear infinite;
pointer-events:none;
z-index:0;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* NAVBAR */

.navbar{
position:relative;
z-index:5;
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 80px;
background:rgba(0,0,0,0.85);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,217,0,0.3);
}

.nav-left{
display:flex;
align-items:center;
gap:40px;
}

.nav-left img{
height:40px;
cursor:pointer;
}

.nav-left a{
color:#ddd;
text-decoration:none;
font-size:18px;
cursor:pointer;
}

.nav-left a:hover{
color:#ffd900;
}

.nav-right{
display:flex;
align-items:center;
gap:20px;
}

.nav-right a{
color:#ddd;
text-decoration:none;
cursor:pointer;
}

.signup{
background:#ffd900;
color:black;
padding:7px 18px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.hero{
position:relative;
z-index:2;
display:flex;
justify-content:center;
align-items:center;
margin-top:40px;
}

.hero img{
width:70%;
max-width:1000px;
border-radius:14px;
box-shadow:0 0 40px rgba(255,217,0,0.25);
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
z-index:10;
}

.popup-box{
background:#111;
padding:35px;
width:350px;
border-radius:12px;
border:1px solid rgba(255,217,0,0.3);
position:relative;
}

.popup-box h2{
margin-top:0;
}

.popup-box input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
background:#000;
border:1px solid #333;
color:white;
border-radius:6px;
}

.popup-box button{
width:100%;
padding:10px;
background:#ffd900;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.close{
position:absolute;
right:15px;
top:10px;
cursor:pointer;
font-size:20px;
}

/* PROFILE */

.profile{
display:none;
gap:15px;
align-items:center;
}

.wallet{
color:#ffd900;
font-weight:bold;
}

.logout{
cursor:pointer;
}

</style>

</head>

<body>

<div class="navbar">

<div class="nav-left">
<img src="Logo.png">
<a>Main</a>
<a>Shop</a>
<a>Topup</a>
</div>

<div class="nav-right" id="navGuest">
<a onclick="openLogin()">Sign In</a>
<a class="signup" onclick="openSignup()">Sign Up</a>
</div>

<div class="nav-right profile" id="navUser">
<span id="username"></span>
<span class="wallet">💰 <span id="wallet">0</span></span>
<a class="logout" onclick="logout()">Logout</a>
</div>

</div>

<div class="hero">
<img src="Banner.jpg">
</div>

<!-- LOGIN -->

<div class="popup" id="loginPopup">

<div class="popup-box">

<span class="close" onclick="closePopup()">✖</span>

<h2>Sign In</h2>

<input id="loginUser" placeholder="Username">

<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- SIGNUP -->

<div class="popup" id="signupPopup">

<div class="popup-box">

<span class="close" onclick="closePopup()">✖</span>

<h2>Sign Up</h2>

<input id="regUser" placeholder="Username">

<input id="regPass" type="password" placeholder="Password">

<button onclick="register()">Create Account</button>

</div>

</div>

<script>

/* สร้าง ADMIN อัตโนมัติ */

if(!localStorage.getItem("user_admin")){
localStorage.setItem("user_admin","696969")
localStorage.setItem("wallet_admin",0)
}

/* POPUP */

function openLogin(){
document.getElementById("loginPopup").style.display="flex"
}

function openSignup(){
document.getElementById("signupPopup").style.display="flex"
}

function closePopup(){
document.getElementById("loginPopup").style.display="none"
document.getElementById("signupPopup").style.display="none"
}

/* REGISTER */

function register(){

let user=document.getElementById("regUser").value
let pass=document.getElementById("regPass").value

if(!user||!pass){
alert("กรอกข้อมูลก่อน")
return
}

if(localStorage.getItem("user_"+user)){
alert("User นี้มีอยู่แล้ว")
return
}

localStorage.setItem("user_"+user,pass)

/* เงินเริ่มต้น = 0 */

localStorage.setItem("wallet_"+user,0)

alert("สมัครสำเร็จ")

closePopup()

}

/* LOGIN */

function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

let saved=localStorage.getItem("user_"+user)

if(saved==pass){

localStorage.setItem("login",user)

loadUser()

closePopup()

}else{

alert("ข้อมูลไม่ถูกต้อง")

}

}

/* LOAD USER */

function loadUser(){

let user=localStorage.getItem("login")

if(!user) return

document.getElementById("navGuest").style.display="none"
document.getElementById("navUser").style.display="flex"

document.getElementById("username").innerText=user

let money=localStorage.getItem("wallet_"+user)

document.getElementById("wallet").innerText=money

}

/* LOGOUT */

function logout(){

localStorage.removeItem("login")

location.reload()

}

loadUser()

</script>

</body>
</html>

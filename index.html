<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jeab Game Store</title>

<link rel="icon" type="image/png" href="Logo.png">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: radial-gradient(circle at top, #3b2a00, #000000);
color:white;
overflow-x:hidden;
}

/* stars */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#ffd900 1px, transparent 1px);
background-size:60px 60px,120px 120px;
opacity:0.15;
animation:stars 60s linear infinite;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:rgba(0,0,0,0.75);
backdrop-filter:blur(10px);
border-bottom:1px solid rgba(255,217,0,0.3);
}

.nav-left{
display:flex;
align-items:center;
gap:40px;
}

.nav-left img{
height:45px;
}

.nav-left a{
color:#ddd;
text-decoration:none;
font-size:18px;
cursor:pointer;
}

.nav-left a:hover{
color:#ffd900;
}

.nav-right{
display:flex;
gap:25px;
}

.signup{
background:#ffd900;
color:black;
padding:6px 15px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

.hero{
display:flex;
justify-content:center;
align-items:center;
height:60vh;
}

.hero img{
width:70%;
border-radius:14px;
}

/* shop */

.shop{
padding:60px;
display:none;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:30px;
}

.item{
background:#111;
padding:20px;
border-radius:10px;
text-align:center;
border:1px solid rgba(255,217,0,0.2);
}

.item button{
margin-top:10px;
background:#ffd900;
border:none;
padding:8px 15px;
cursor:pointer;
}

/* popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{
background:#111;
padding:40px;
border-radius:12px;
width:300px;
}

.popup input{
width:100%;
padding:8px;
margin:10px 0;
}

.popup button{
width:100%;
padding:10px;
background:#ffd900;
border:none;
cursor:pointer;
}

/* admin */

.admin{
display:none;
padding:50px;
}

</style>
</head>

<body>

<div class="navbar">

<div class="nav-left">

<img src="Logo.png">

<a onclick="showHome()">Main</a>
<a onclick="showShop()">Shop</a>

</div>

<div class="nav-right">

<span id="userLabel"></span>

<a onclick="openLogin()">Sign In</a>
<a class="signup" onclick="openRegister()">Sign Up</a>

</div>

</div>

<div class="hero" id="home">
<img src="Banner.jpg">
</div>

<div class="shop" id="shop"></div>

<div class="admin" id="admin">

<h2>Admin Panel</h2>

<input id="itemName" placeholder="Item Name">
<input id="itemPrice" placeholder="Price">

<button onclick="addItem()">Add Item</button>

</div>

<!-- LOGIN -->

<div class="popup" id="loginPopup">

<div class="popup-box">

<h3>Login</h3>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- REGISTER -->

<div class="popup" id="registerPopup">

<div class="popup-box">

<h3>Register</h3>

<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">

<button onclick="register()">Register</button>

</div>

</div>

<script>

let users = JSON.parse(localStorage.getItem("users")) || []
let products = JSON.parse(localStorage.getItem("products")) || [
{name:"VIP Rank",price:50},
{name:"Legend Rank",price:120}
]

let currentUser = localStorage.getItem("user")

function save(){
localStorage.setItem("users",JSON.stringify(users))
localStorage.setItem("products",JSON.stringify(products))
}

function showHome(){
document.getElementById("home").style.display="flex"
document.getElementById("shop").style.display="none"
}

function showShop(){

document.getElementById("home").style.display="none"
document.getElementById("shop").style.display="grid"

renderShop()
}

function renderShop(){

let shop=document.getElementById("shop")
shop.innerHTML=""

products.forEach((p,i)=>{

shop.innerHTML+=`

<div class="item">

<h3>${p.name}</h3>
<p>${p.price} coins</p>

<button onclick="buyItem(${i})">Buy</button>

</div>

`

})

}

function buyItem(i){

if(!currentUser){
alert("Login first")
return
}

alert("Purchased "+products[i].name)

}

function openLogin(){
document.getElementById("loginPopup").style.display="flex"
}

function openRegister(){
document.getElementById("registerPopup").style.display="flex"
}

function register(){

let u=document.getElementById("regUser").value
let p=document.getElementById("regPass").value

users.push({u,p})

save()

alert("Account created")

}

function login(){

let u=document.getElementById("loginUser").value
let p=document.getElementById("loginPass").value

let user=users.find(x=>x.u==u && x.p==p)

if(user){

currentUser=u
localStorage.setItem("user",u)

updateUser()

}else{

alert("Wrong login")

}

}

function updateUser(){

if(currentUser){

document.getElementById("userLabel").innerHTML="Hello "+currentUser

if(currentUser=="admin"){
document.getElementById("admin").style.display="block"
}

}

}

function addItem(){

let name=document.getElementById("itemName").value
let price=document.getElementById("itemPrice").value

products.push({name,price})

save()

renderShop()

}

updateUser()
renderShop()

</script>

</body>
</html>

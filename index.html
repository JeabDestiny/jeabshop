<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jeab Game Store</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background: radial-gradient(circle at top, #3b2a00, #000000);
    color:white;
    overflow-x:hidden;
}

/* ดาววิบๆ */
body::before{
    content:"";
    position:fixed;
    width:100%;
    height:100%;
    background-image:
    radial-gradient(white 1px, transparent 1px),
    radial-gradient(#ffd900 1px, transparent 1px);
    background-size:60px 60px,120px 120px;
    opacity:0.15;
    animation:stars 60s linear infinite;
}

@keyframes stars{
    from{transform:translateY(0);}
    to{transform:translateY(-1000px);}
}

/* NAVBAR */

.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 70px;
    background:rgba(0,0,0,0.7);
    backdrop-filter:blur(8px);
    border-bottom:1px solid rgba(255,217,0,0.3);
}

.nav-left{
    display:flex;
    align-items:center;
    gap:40px;
}

.nav-left img{
    height:45px;
}

/* menu */

.nav-left a{
    color:white;
    text-decoration:none;
    font-size:18px;
    position:relative;
    transition:0.3s;
}

.nav-left a:hover{
    color:#ffd900;
}

/* เส้นเรืองแสง */

.nav-left a::after{
    content:"";
    position:absolute;
    width:0%;
    height:2px;
    background:#ffd900;
    left:0;
    bottom:-5px;
    transition:0.3s;
}

.nav-left a:hover::after{
    width:100%;
}

/* RIGHT MENU */

.nav-right{
    display:flex;
    gap:25px;
}

.nav-right a{
    text-decoration:none;
    color:white;
    font-size:16px;
}

/* SIGN UP BUTTON */

.signup{
    background:#ffd900;
    color:black;
    padding:7px 18px;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.signup:hover{
    transform:scale(1.05);
}

/* BANNER */

.hero{
    display:flex;
    justify-content:center;
    align-items:center;
    height:70vh;
}

.hero img{
    width:70%;
    max-width:1000px;
    border-radius:12px;
    box-shadow:
    0 0 40px rgba(255,217,0,0.25);
}

/* mascot corner */

.mascot{
    position:fixed;
    bottom:20px;
    right:20px;
    width:90px;
    opacity:0.9;
}

</style>
</head>

<body>

<div class="navbar">

<div class="nav-left">
<img src="Logo.jpg">

<a href="#">Main</a>
<a href="#">Shop</a>
<a href="#">Topup</a>
</div>

<div class="nav-right">
<a href="#">Sign In</a>
<a class="signup" href="#">Sign Up</a>
</div>

</div>


<div class="hero">
<img src="Banner.jpg">
</div>


<img class="mascot" src="Logo.jpg">

</body>
</html>

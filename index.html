<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jeab Game Store</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:url("Banner.jpg") no-repeat center center fixed;
    background-size:cover;
}

/* แถบบน */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 60px;
    background:rgba(0,0,0,0.6);
    backdrop-filter: blur(5px);
}

/* ฝั่งซ้าย */
.nav-left{
    display:flex;
    align-items:center;
    gap:40px;
}

.nav-left img{
    height:45px;
}

/* เมนู */
.nav-left a{
    color:white;
    text-decoration:none;
    font-size:18px;
    transition:0.3s;
}

.nav-left a:hover{
    color:#ffd900;
}

/* ฝั่งขวา */
.nav-right{
    display:flex;
    gap:25px;
}

.nav-right a{
    color:white;
    text-decoration:none;
    font-size:16px;
}

.signup{
    background:#ffd900;
    color:black;
    padding:6px 15px;
    border-radius:6px;
}

</style>
</head>

<body>

<div class="navbar">

<div class="nav-left">
<img src="Logo.jpg">

<a href="#">Main</a>
<a href="#">Shop</a>
<a href="#">Topup</a>
</div>

<div class="nav-right">
<a href="#">Sign In</a>
<a class="signup" href="#">Sign Up</a>
</div>

</div>

</body>
</html>

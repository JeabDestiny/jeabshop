<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jeab Game Store</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;

/* พื้นหลัง */
background:
linear-gradient(rgba(0,0,0,0.6),rgba(0,0,0,0.9)),
url("banner.jpg");

background-size:cover;
background-position:center;
background-attachment:fixed;
}

/* เมนูด้านบน */
.navbar{
display:flex;
justify-content:center;
align-items:center;
gap:40px;
padding:20px;
background:rgba(0,0,0,0.7);
border-bottom:2px solid #ffd000;
}

/* โลโก้ */
.logo{
height:40px;
}

/* ลิงก์เมนู */
.navbar a{
color:#ffd000;
text-decoration:none;
font-weight:bold;
font-size:18px;
transition:0.3s;
}

/* hover */
.navbar a:hover{
color:white;
}

/* ตรงกลางเว็บ */
.center{
display:flex;
justify-content:center;
align-items:center;
height:80vh;
font-size:60px;
font-weight:bold;
color:#ffd000;
text-shadow:0 0 20px #ffd000;
}

</style>
</head>

<body>

<div class="navbar">

<img src="logo.jpg" class="logo">

<a href="#">Main</a>
<a href="#">Shop</a>
<a href="#">Topup</a>
<a href="#">Sign In</a>
<a href="#">Sign Up</a>

</div>

<div class="center">
Coming Soon !!!
</div>

</body>
</html>

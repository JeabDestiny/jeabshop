<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jeab Game Store</title>

<link rel="icon" type="image/png" href="Logo.png">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background: radial-gradient(circle at top, #3b2a00, #000000);
color:white;
overflow-x:hidden;
}

/* ดาวพื้นหลัง */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px),
radial-gradient(#ffd900 1px, transparent 1px);
background-size:60px 60px,120px 120px;
opacity:0.15;
animation:stars 60s linear infinite;
}

@keyframes stars{
from{transform:translateY(0);}
to{transform:translateY(-1000px);}
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:18px 100px;
background:rgba(0,0,0,0.8);
border-bottom:1px solid rgba(255,217,0,0.3);
}

.nav-left{
display:flex;
align-items:center;
gap:35px;
}

.nav-left img{
height:40px;
}

.nav-left a{
color:#ddd;
text-decoration:none;
font-size:17px;
}

.nav-left a:hover{
color:#ffd900;
}

.nav-right{
display:flex;
align-items:center;
gap:20px;
}

.nav-right a{
color:#ddd;
text-decoration:none;
}

.signup{
background:#ffd900;
color:black;
padding:7px 18px;
border-radius:8px;
font-weight:bold;
}

/* Banner */

.hero{
display:flex;
justify-content:center;
padding:60px 0;
}

.hero img{
width:85%;
max-width:1100px;
border-radius:12px;
box-shadow:0 0 40px rgba(255,217,0,0.25);
}

/* USER PANEL */

.user-panel{
display:none;
align-items:center;
gap:15px;
}

.wallet{
background:#111;
padding:6px 14px;
border-radius:8px;
border:1px solid #ffd900;
}

.logout{
cursor:pointer;
color:#ff5555;
}

/* POPUP */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup-box{

background:#111;
padding:40px;
border-radius:12px;
width:320px;
position:relative;

box-shadow:0 0 20px rgba(255,217,0,0.3);

}

.popup-box h3{
margin-top:0;
}

.popup-box input{

width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;

background:#000;
border:1px solid #333;
border-radius:6px;
color:white;

}

.popup-box button{

width:100%;
padding:10px;

background:#ffd900;
border:none;

font-weight:bold;
border-radius:8px;
cursor:pointer;

}

/* close button */

.close-btn{

position:absolute;
top:10px;
right:15px;

cursor:pointer;
font-size:20px;

}

/* mascot */

.mascot{
position:fixed;
bottom:20px;
right:20px;
width:90px;
}

</style>
</head>

<body>

<div class="navbar">

<div class="nav-left">

<img src="Logo.png">

<a href="#">Main</a>
<a href="#">Shop</a>
<a href="#">Topup</a>

</div>

<div class="nav-right" id="guestMenu">

<a href="#" onclick="openLogin()">Sign In</a>

<a class="signup" href="#" onclick="openRegister()">Sign Up</a>

</div>

<div class="user-panel" id="userPanel">

<span id="username"></span>

<div class="wallet">
💰 <span id="wallet">0</span>
</div>

<span class="logout" onclick="logout()">Logout</span>

</div>

</div>

<div class="hero">
<img src="Banner.jpg">
</div>

<img class="mascot" src="Logo.png">

<!-- LOGIN -->

<div class="popup" id="loginPopup">

<div class="popup-box">

<span class="close-btn" onclick="closePopup()">✕</span>

<h3>Login</h3>

<input id="loginUser" placeholder="Username">
<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">Login</button>

</div>

</div>

<!-- REGISTER -->

<div class="popup" id="registerPopup">

<div class="popup-box">

<span class="close-btn" onclick="closePopup()">✕</span>

<h3>Sign Up</h3>

<input id="regUser" placeholder="Username">
<input id="regPass" type="password" placeholder="Password">

<button onclick="register()">Register</button>

</div>

</div>

<script>

/* popup */

function openLogin(){

document.getElementById("loginPopup").style.display="flex"

}

function openRegister(){

document.getElementById("registerPopup").style.display="flex"

}

function closePopup(){

document.getElementById("loginPopup").style.display="none"
document.getElementById("registerPopup").style.display="none"

}

/* register */

function register(){

let user=document.getElementById("regUser").value
let pass=document.getElementById("regPass").value

if(user==""||pass==""){

alert("กรอกข้อมูลก่อน")

return

}

localStorage.setItem(user,pass)

localStorage.setItem(user+"_wallet",100)

alert("สมัครสมาชิกสำเร็จ")

closePopup()

}

/* login */

function login(){

let user=document.getElementById("loginUser").value
let pass=document.getElementById("loginPass").value

let saved=localStorage.getItem(user)

if(saved==pass){

localStorage.setItem("loggedUser",user)

showUser()

closePopup()

}else{

alert("ข้อมูลไม่ถูกต้อง")

}

}

/* show user */

function showUser(){

let user=localStorage.getItem("loggedUser")

if(user){

document.getElementById("guestMenu").style.display="none"
document.getElementById("userPanel").style.display="flex"

document.getElementById("username").innerText=user

let money=localStorage.getItem(user+"_wallet")

document.getElementById("wallet").innerText=money

}

}

/* logout */

function logout(){

localStorage.removeItem("loggedUser")

location.reload()

}

showUser()

</script>

</body>
</html>
